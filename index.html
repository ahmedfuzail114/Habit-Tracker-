<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Habit Tracker">
<meta name="theme-color" content="#1a1a1a">
<title>Habit Tracker 2026-2027</title>
<link rel="manifest" id="manifest-placeholder">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap');
:root{--bg:#f7f4ef;--paper:#fdfcfa;--ink:#1a1a1a;--ink-light:#555;--border:#d4cfc8;--cell:#f9f7f4;--gold:#b8860b;--green:#2d6a4f;--shadow:0 2px 16px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--ink);min-height:100vh;min-height:-webkit-fill-available}
.top-nav{background:var(--ink);color:#fdfcfa;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.top-nav h1{font-family:'Playfair Display',serif;font-size:16px;font-weight:700}
.nav-tabs{display:flex;gap:4px}
.nav-tab{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);padding:5px 12px;border-radius:6px;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;cursor:pointer;letter-spacing:.5px;text-transform:uppercase;transition:all .15s;-webkit-tap-highlight-color:transparent}
.nav-tab.active,.nav-tab:hover{background:var(--gold);border-color:var(--gold);color:#fff}
.page{display:none}.page.active{display:block}
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;background:var(--paper);border-bottom:1px solid var(--border);position:sticky;top:52px;z-index:99}
.month-nav button{background:var(--ink);border:none;color:#fdfcfa;width:34px;height:34px;border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.month-nav button:disabled{opacity:.2;cursor:default}
.month-center{text-align:center}
.month-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:var(--ink)}
.month-year{font-size:10px;color:var(--ink-light);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.month-score{font-size:11px;color:var(--gold);font-weight:600;margin-top:2px}
.grid-wrap{padding:10px 8px 80px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tracker-table{border-collapse:collapse;width:100%;min-width:580px;background:var(--paper);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border)}
.tracker-table thead th{font-size:9px;font-weight:700;color:rgba(255,255,255,.7);text-align:center;padding:6px 2px;border-right:1px solid rgba(255,255,255,.1);background:var(--ink)}
.tracker-table thead th:first-child{text-align:left;padding-left:10px;min-width:120px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);position:sticky;left:0;z-index:10;background:var(--ink)}
.tracker-table thead th.weekend{background:#2a2a2a}
.tracker-table tbody tr{border-bottom:1px solid var(--border)}
.tracker-table tbody tr:last-child{border-bottom:none}
.habit-label{font-size:12px;font-weight:500;color:var(--ink);padding:0 8px 0 10px;white-space:nowrap;border-right:2px solid var(--ink);background:var(--paper);position:sticky;left:0;z-index:5}
.habit-label-inner{display:flex;align-items:center;gap:6px;padding:8px 0}
.habit-emoji{font-size:13px}
.habit-text{font-size:10px;font-weight:600;color:var(--ink);line-height:1.2}
.habit-sub{font-size:8px;color:var(--ink-light);line-height:1.2}
.day-cell{width:24px;min-width:20px;text-align:center;border-right:1px solid var(--border);padding:3px 1px;vertical-align:middle}
.day-cell.weekend{background:#f2ede6}
.tick-box{width:17px;height:17px;border:1.5px solid var(--border);border-radius:3px;margin:0 auto;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .12s;background:var(--cell);user-select:none;-webkit-tap-highlight-color:transparent}
.tick-box.done{background:var(--ink);border-color:var(--ink);color:#fdfcfa}
.tick-box.done::after{content:'✓'}
.tick-box.future{opacity:.2;cursor:default}
/* OVERVIEW */
.overview-wrap{padding:14px 14px 80px}
.overview-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:900;margin-bottom:14px;color:var(--ink)}
.year-stats{background:var(--ink);color:#fdfcfa;border-radius:12px;padding:14px;margin-bottom:14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center}
.ys-num{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;color:var(--gold)}
.ys-lbl{font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.months-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.month-card{background:var(--paper);border:1px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.mc-name{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:var(--ink)}
.mc-year{font-size:9px;color:var(--ink-light);margin-bottom:7px}
.mc-bar-wrap{background:var(--border);border-radius:99px;height:4px;margin-bottom:5px;overflow:hidden}
.mc-bar{height:100%;border-radius:99px;background:var(--ink);transition:width .4s}
.mc-stats{display:flex;justify-content:space-between;font-size:9px;color:var(--ink-light)}
.mc-pct{font-weight:700;color:var(--gold)}
.mc-perfect{font-weight:700;color:var(--green)}
.breakdown-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;margin-bottom:10px;color:var(--ink);border-bottom:2px solid var(--ink);padding-bottom:5px}
.habit-stat-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.habit-stat-row:last-child{border-bottom:none}
.hs-icon{font-size:15px;width:20px;flex-shrink:0}
.hs-name{font-size:11px;font-weight:600;color:var(--ink);flex:1}
.hs-bar-wrap{width:70px;background:var(--border);border-radius:99px;height:4px;overflow:hidden;flex-shrink:0}
.hs-bar{height:100%;border-radius:99px;background:var(--ink)}
.hs-pct{font-size:10px;font-weight:700;color:var(--gold);min-width:30px;text-align:right}
</style>
</head>
<body>
<div class="top-nav">
  <h1>Habit Tracker 2026-27</h1>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('daily')">Daily</button>
    <button class="nav-tab" onclick="switchTab('overview')">Overview</button>
  </div>
</div>

<div class="page active" id="page-daily">
  <div class="month-nav">
    <button id="prev-month" onclick="changeMonth(-1)">&#8249;</button>
    <div class="month-center">
      <div class="month-name" id="month-name"></div>
      <div class="month-year" id="month-year"></div>
      <div class="month-score" id="month-score"></div>
    </div>
    <button id="next-month" onclick="changeMonth(1)">&#8250;</button>
  </div>
  <div class="grid-wrap">
    <table class="tracker-table">
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<div class="page" id="page-overview">
  <div class="overview-wrap">
    <div class="overview-title">Year at a Glance</div>
    <div class="year-stats" id="year-stats"></div>
    <div class="months-grid" id="months-grid"></div>
    <div class="breakdown-title">Habit Completion - All Year</div>
    <div id="habit-breakdown"></div>
  </div>
</div>

<script>
var HABITS=[
  {id:'salah',emoji:'🕌',name:'Pray 5 Salah',sub:'All 5 prayers'},
  {id:'quran',emoji:'📖',name:'Quran',sub:'20 min recitation'},
  {id:'dhikr',emoji:'📿',name:'Dhikr & Istighfar',sub:'Morning/Evening'},
  {id:'study',emoji:'📚',name:'Study 4 hours',sub:'Focused sessions'},
  {id:'workout',emoji:'💪',name:'Workout',sub:'30 min exercise'},
  {id:'water',emoji:'💧',name:'Drink 3L Water',sub:'Stay hydrated'},
  {id:'sleep',emoji:'🌙',name:'Sleep 7-8 hours',sub:'Consistent schedule'},
  {id:'skill',emoji:'💡',name:'Learn a Skill',sub:'30 min learning'},
  {id:'deepwork',emoji:'🎯',name:'Deep Work',sub:'2 hours focused'},
  {id:'read',emoji:'📰',name:'Read',sub:'15 min reading'}
];
var MONTHS=[
  {year:2026,month:6,label:'July',abbr:'Jul'},
  {year:2026,month:7,label:'August',abbr:'Aug'},
  {year:2026,month:8,label:'September',abbr:'Sep'},
  {year:2026,month:9,label:'October',abbr:'Oct'},
  {year:2026,month:10,label:'November',abbr:'Nov'},
  {year:2026,month:11,label:'December',abbr:'Dec'},
  {year:2027,month:0,label:'January',abbr:'Jan'},
  {year:2027,month:1,label:'February',abbr:'Feb'},
  {year:2027,month:2,label:'March',abbr:'Mar'},
  {year:2027,month:3,label:'April',abbr:'Apr'},
  {year:2027,month:4,label:'May',abbr:'May'},
  {year:2027,month:5,label:'June',abbr:'Jun'},
  {year:2027,month:6,label:'July',abbr:'Jul'}
];
var currentIdx=0;

function sKey(y,mo,d,hid){return 'ht2_'+y+'_'+mo+'_'+d+'_'+hid;}
function isDone(y,mo,d,hid){try{return localStorage.getItem(sKey(y,mo,d,hid))==='1';}catch(e){return false;}}
function setDone(y,mo,d,hid,v){try{if(v)localStorage.setItem(sKey(y,mo,d,hid),'1');else localStorage.removeItem(sKey(y,mo,d,hid));}catch(e){}}

function switchTab(t){
  document.querySelectorAll('.nav-tab').forEach(function(el,i){el.classList.toggle('active',(i===0&&t==='daily')||(i===1&&t==='overview'));});
  document.getElementById('page-daily').classList.toggle('active',t==='daily');
  document.getElementById('page-overview').classList.toggle('active',t==='overview');
  if(t==='overview')renderOverview();
}
function changeMonth(dir){
  currentIdx=Math.max(0,Math.min(MONTHS.length-1,currentIdx+dir));
  renderMonth();
}
function getDays(y,mo){return new Date(y,mo+1,0).getDate();}

function renderMonth(){
  var m=MONTHS[currentIdx],year=m.year,month=m.month,days=getDays(year,month);
  var today=new Date();
  document.getElementById('month-name').textContent=m.label;
  document.getElementById('month-year').textContent=year;
  document.getElementById('prev-month').disabled=currentIdx===0;
  document.getElementById('next-month').disabled=currentIdx===MONTHS.length-1;

  var thead=document.getElementById('table-head');
  thead.innerHTML='';
  var hr=document.createElement('tr');
  var th0=document.createElement('th');th0.textContent='HABITS';hr.appendChild(th0);
  for(var d=1;d<=days;d++){
    var th=document.createElement('th');
    var dow=new Date(year,month,d).getDay();
    th.textContent=d;
    if(dow===0||dow===6)th.className='weekend';
    hr.appendChild(th);
  }
  thead.appendChild(hr);

  var tbody=document.getElementById('table-body');
  tbody.innerHTML='';

  HABITS.forEach(function(habit){
    var tr=document.createElement('tr');
    var td0=document.createElement('td');
    td0.className='habit-label';
    td0.innerHTML='<div class="habit-label-inner"><span class="habit-emoji">'+habit.emoji+'</span><div><div class="habit-text">'+habit.name+'</div><div class="habit-sub">'+habit.sub+'</div></div></div>';
    tr.appendChild(td0);
    for(var d=1;d<=days;d++){
      var date=new Date(year,month,d);
      var dow=date.getDay();
      var isFuture=date>today;
      var done=isDone(year,month,d,habit.id);
      var td=document.createElement('td');
      td.className='day-cell'+((dow===0||dow===6)?' weekend':'');
      var box=document.createElement('div');
      box.className='tick-box'+(done?' done':'')+(isFuture?' future':'');
      if(!isFuture){
        (function(y,mo,day,hid,boxEl){
          boxEl.onclick=function(){
            var nowDone=boxEl.classList.toggle('done');
            setDone(y,mo,day,hid,nowDone);
            updateMonthScore();
          };
        })(year,month,d,habit.id,box);
      }
      td.appendChild(box);tr.appendChild(td);
    }
    tbody.appendChild(tr);
  });
  updateMonthScore();
}

function updateMonthScore(){
  var m=MONTHS[currentIdx],year=m.year,month=m.month,days=getDays(year,month);
  var today=new Date(),total=0,done=0,perfect=0;
  for(var d=1;d<=days;d++){
    var date=new Date(year,month,d);
    if(date>today)break;
    var dayDone=0;
    HABITS.forEach(function(h){if(isDone(year,month,d,h.id))dayDone++;});
    total+=HABITS.length;done+=dayDone;
    if(dayDone===HABITS.length)perfect++;
  }
  var pct=total>0?Math.round(done/total*100):0;
  document.getElementById('month-score').textContent=pct+'% complete - '+perfect+' perfect day'+(perfect!==1?'s':'');
}

function renderOverview(){
  var today=new Date(),totalYear=0,doneYear=0,perfectYear=0,trackedDays=0;
  var habitCounts={};HABITS.forEach(function(h){habitCounts[h.id]=0;});
  var mgEl=document.getElementById('months-grid');mgEl.innerHTML='';

  MONTHS.forEach(function(m,idx){
    var year=m.year,month=m.month,days=getDays(year,month),mTotal=0,mDone=0,mPerfect=0;
    for(var d=1;d<=days;d++){
      var date=new Date(year,month,d);if(date>today)break;
      var dayDone=0;
      HABITS.forEach(function(h){if(isDone(year,month,d,h.id)){dayDone++;habitCounts[h.id]++;}});
      mTotal+=HABITS.length;mDone+=dayDone;
      if(dayDone===HABITS.length)mPerfect++;
      trackedDays++;
    }
    totalYear+=mTotal;doneYear+=mDone;perfectYear+=mPerfect;
    var pct=mTotal>0?Math.round(mDone/mTotal*100):0;
    var card=document.createElement('div');card.className='month-card';
    card.innerHTML='<div class="mc-name">'+m.label+'</div><div class="mc-year">'+year+'</div><div class="mc-bar-wrap"><div class="mc-bar" style="width:'+pct+'%"></div></div><div class="mc-stats"><span class="mc-pct">'+pct+'%</span><span class="mc-perfect">'+mPerfect+' perfect</span></div>';
    card.onclick=(function(i){return function(){currentIdx=i;switchTab('daily');};})(idx);
    mgEl.appendChild(card);
  });

  var yearPct=totalYear>0?Math.round(doneYear/totalYear*100):0;
  document.getElementById('year-stats').innerHTML='<div><div class="ys-num">'+yearPct+'%</div><div class="ys-lbl">Overall</div></div><div><div class="ys-num">'+perfectYear+'</div><div class="ys-lbl">Perfect Days</div></div><div><div class="ys-num">'+trackedDays+'</div><div class="ys-lbl">Days Tracked</div></div>';

  var bdEl=document.getElementById('habit-breakdown');bdEl.innerHTML='';
  var base=Math.max(trackedDays,1);
  HABITS.forEach(function(h){
    var pct=Math.round(habitCounts[h.id]/base*100);
    var row=document.createElement('div');row.className='habit-stat-row';
    var icon=document.createElement('div');icon.className='hs-icon';icon.textContent=h.emoji;
    var name=document.createElement('div');name.className='hs-name';name.textContent=h.name;
    var bw=document.createElement('div');bw.className='hs-bar-wrap';
    var bf=document.createElement('div');bf.className='hs-bar';bf.style.width=pct+'%';
    bw.appendChild(bf);
    var pc=document.createElement('div');pc.className='hs-pct';pc.textContent=pct+'%';
    row.appendChild(icon);row.appendChild(name);row.appendChild(bw);row.appendChild(pc);
    bdEl.appendChild(row);
  });
}

// init
var now=new Date();
for(var i=0;i<MONTHS.length;i++){if(MONTHS[i].year===now.getFullYear()&&MONTHS[i].month===now.getMonth()){currentIdx=i;break;}}
renderMonth();
</script>
</body>
</html>
